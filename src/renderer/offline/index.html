<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>POS offline</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #15191d;
        color: #f3f5f7;
        font:
          16px system-ui,
          sans-serif;
      }
      .state {
        text-align: center;
        max-width: 420px;
        padding: 32px;
      }
      .mark {
        width: 48px;
        height: 48px;
        margin: 0 auto 22px;
        border: 4px solid #59636e;
        border-top-color: #43b581;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      h1 {
        font-size: 24px;
        margin: 0 0 10px;
      }
      p {
        color: #aeb7c0;
        line-height: 1.5;
        margin: 0;
      }
      .reason {
        margin-top: 16px;
        font-size: 13px;
        color: #7f8994;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="state">
      <div class="mark"></div>
      <h1>Reconnecting to the POS</h1>
      <p>The desktop app will restore this screen when the server is available.</p>
      <p class="reason" id="reason"></p>
    </main>
    <script>
      const p = new URLSearchParams(location.search);
      document.getElementById('reason').textContent =
        'Retrying in ' + (p.get('retryIn') || 'a few') + ' seconds';
    </script>
  </body>
</html>
