name: Release Workflow

on:
  push:
    branches: ['main']

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest]
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build renderer and main process
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level high

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Release evidence summary
        if: always()
        run: |
          "# Desktop Release Evidence" >> $env:GITHUB_STEP_SUMMARY
          "- npm ci" >> $env:GITHUB_STEP_SUMMARY
          "- gitleaks/gitleaks-action@v2" >> $env:GITHUB_STEP_SUMMARY
          "- npm run lint" >> $env:GITHUB_STEP_SUMMARY
          "- npm test" >> $env:GITHUB_STEP_SUMMARY
          "- npm run build" >> $env:GITHUB_STEP_SUMMARY
          "- npm audit --audit-level high" >> $env:GITHUB_STEP_SUMMARY
          "- npm run build:win" >> $env:GITHUB_STEP_SUMMARY

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.exe.blockmap
            dist/builder-debug.yml
            dist/builder-effective-config.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    outputs:
      tag: ${{ steps.get_version.outputs.tag }}
      preview: ${{ steps.get_preview.outputs.preview }}

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - id: get_version
        run: |
          version=$(node -p 'require("./package.json").version')
          echo "tag=$version" >> $GITHUB_OUTPUT

      - id: get_preview
        run: |
          preview=$(node -p 'require("./package.json").preview ? "true" : "false"')
          echo "preview=$preview" >> $GITHUB_OUTPUT

      - name: Debug Version Variables
        run: |
          echo "Version Tag: ${{ steps.get_version.outputs.tag }}"
          echo "Preview Status: ${{ steps.get_preview.outputs.preview }}"
          echo "Raw package.json content:"
          cat package.json

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.tag }}
          name: Release v${{ steps.get_version.outputs.tag }}
          draft: false
          prerelease: ${{ steps.get_preview.outputs.preview == 'true' }}
          files: artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
